services:
  php85:
    image: chajr/php85-dev
    networks:
      - backend85
    volumes:
      - ../build:/var/www/html/build
      - ${MOUNT_POINT}
    command: ${RUN_COMMAND}
    environment:
      - RABBIT_HOST=rabbitmq85
    depends_on:
      - rabbitmq85
  rabbitmq85:
    image: rabbitmq:3-management
    networks:
      - backend85

networks:
  backend85:
    driver: bridge