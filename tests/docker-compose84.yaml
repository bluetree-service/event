services:
  php84:
    image: chajr/php84-dev
    networks:
      - backend84
    command: ${RUN_COMMAND}
    volumes:
      - ${MOUNT_POINT}
  rabbitmq82:
    image: rabbitmq:3-management
    networks:
      - backend82
    ports:
      - "15672:15672"
      - "5672:5672"

networks:
  backend84:
    driver: bridge