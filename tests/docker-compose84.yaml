services:
  php84:
    image: chajr/php84-dev
    networks:
      - backend84
    command: ${RUN_COMMAND}
    volumes:
      - ${MOUNT_POINT}
    environment:
      - RABBIT_HOST=rabbitmq84
    depends_on:
      - rabbitmq84
  rabbitmq84:
    image: rabbitmq:3-management
    networks:
      - backend84

networks:
  backend84:
    driver: bridge