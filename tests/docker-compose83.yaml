services:
  php83:
    image: chajr/php83-dev
    networks:
      - backend83
    command: ${RUN_COMMAND}
    volumes:
      - ${MOUNT_POINT}
    environment:
      - RABBIT_HOST=rabbitmq83
    depends_on:
      - rabbitmq83
  rabbitmq83:
    image: rabbitmq:3-management
    networks:
      - backend83

networks:
  backend83:
    driver: bridge